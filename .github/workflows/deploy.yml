# ==========================================================================
# GymSync — GitHub Actions CI/CD Pipeline
# On push to main: Build → Test → Deploy to EC2
# ==========================================================================

name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run build verification
        run: |
          echo "✓ Build completed successfully"
          ls -la dist/
          echo "✓ dist/ directory verified"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          SCP_CMD="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          echo "📦 Syncing project files to EC2..."
          # Create project directory on EC2
          $SSH_CMD "mkdir -p ~/gymsync"

          # Sync files (excluding node_modules, .git, local DB)
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='server/gymsync.db' \
            --exclude='.env' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/gymsync/

          echo "🐳 Building and starting Docker containers on EC2..."
          $SSH_CMD "cd ~/gymsync && \
            docker compose down && \
            docker compose build --no-cache && \
            docker compose up -d && \
            echo '✓ Containers started' && \
            docker compose ps"

          echo "🏥 Waiting for health check..."
          sleep 10
          $SSH_CMD "curl -s http://localhost/api/health | python3 -m json.tool || echo 'Health check pending...'"

          echo "✅ Deployment complete!"

      - name: Verify deployment
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          echo "📊 Container status:"
          $SSH_CMD "docker compose -f ~/gymsync/docker-compose.yml ps"
          echo ""
          echo "📋 Container logs (last 10 lines):"
          $SSH_CMD "docker compose -f ~/gymsync/docker-compose.yml logs --tail=10"
